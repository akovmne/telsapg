<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Taxi - Aleksandar</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      /* Using IMG_2340.png as the main background */
      background: #000 url('IMG_2340.png') no-repeat center center;
      background-size: cover;
    }

    /* Dark semi-transparent layer so the text is readable over the photo */
    .main-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }

    .container {
      max-width: 420px;
      padding: 20px;
      z-index: 2; /* Sits above the dark overlay */
      position: relative;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* Status colors restricted to the box only */
    .available { background-color: #2ecc71; border: 2px solid #27ae60; }
    .not-available { background-color: #e74c3c; border: 2px solid #c0392b; }

    .shift {
      margin-top: 15px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      padding: 15px;
      border-radius: 10px;
      line-height: 1.5;
    }

    .contact {
      margin-top: 25px;
    }

    button {
      padding: 14px 20px;
      margin: 8px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 240px;
    }

    .phone { background: #007bff; color: white; }
    .whatsapp { background: #25D366; color: white; }
    .viber { background: #7360F2; color: white; }
  </style>
</head>

<body>
<div class="main-overlay"></div>

<div class="container">
  <h1>Tesla Taxi</h1>
  <div class="subtitle">Aleksandar</div>

  <div id="status" class="status"></div>
  <div id="shift-info" class="shift"></div>

  <div class="contact">
    <button class="phone" onclick="window.location.href='tel:+38268048865'">📞 Call / Pozovi</button><br>
    <button class="whatsapp" onclick="window.location.href='https://wa.me/38268048865'">WhatsApp</button>
    <button class="viber" onclick="window.location.href='viber://chat?number=%2B38268048865'">Viber</button>
  </div>
</div>

<script>
function getWeekType() {
  const now = new Date();
  const referenceDate = new Date(2026, 4, 3); 
  const diffDays = Math.floor((now - referenceDate) / (1000 * 60 * 60 * 24));
  const weekNumber = Math.floor(diffDays / 7);
  return weekNumber % 2 === 0 ? "afternoon" : "morning";
}

function isAvailable() {
  const now = new Date();
  const day = now.getDay();
  if (day === 1) return false;

  const weekType = getWeekType();
  const hours = now.getHours() + now.getMinutes() / 60;

  if (weekType === "morning") {
    return hours >= 7 && hours <= 15;
  } else {
    return hours >= 15 && hours <= 23;
  }
}

const statusDiv = document.getElementById('status');
const shiftDiv = document.getElementById('shift-info');
const weekType = getWeekType();

if (isAvailable()) {
  statusDiv.className = "status available";
  statusDiv.innerHTML = "✅ AVAILABLE NOW<br>✅ DOSTUPAN";
} else {
  statusDiv.className = "status not-available";
  statusDiv.innerHTML = "❌ NOT AVAILABLE<br>❌ NEDOSTUPAN";
}

const shiftNameEN = weekType === "morning" ? "Morning Shift" : "Afternoon Shift";
const shiftNameSRB = weekType === "morning" ? "Prva Smjena" : "Druga Smjena";
const timeRange = weekType === "morning" ? "07:00 – 15:00" : "15:00 – 23:00";

shiftDiv.innerHTML = `
  <strong>${shiftNameEN} / ${shiftNameSRB}</strong><br>
  Mon / Pon: OFF<br>
  Tue–Sun / Uto–Ned: ${timeRange}
`;
</script>

</body>
</html>
